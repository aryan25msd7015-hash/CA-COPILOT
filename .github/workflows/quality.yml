name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ca_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ca_platform
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-change-in-production
      S3_BUCKET: ci-bucket
      FRONTEND_URL: http://localhost:3000
      ENV: test
      SQL_ECHO: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pip-audit
      - name: Backend dependency audit
        run: pip-audit -r backend/requirements.txt
      - name: Migrate database
        working-directory: backend
        run: alembic upgrade head
      - name: Backend tests
        working-directory: backend
        run: pytest -q
      - name: Synthetic 2000-company feature regression
        run: python artifacts/synthetic_2000_regression.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --omit=dev
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  browser-regression:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Playwright dependencies
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Start application stack
        run: docker compose up -d postgres redis backend frontend
      - name: Prepare demo database
        run: |
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T backend python scripts/seed_demo_data.py
      - name: Run browser regression
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_DEMO_EMAIL: demo@cacopilot.example.com
          PLAYWRIGHT_DEMO_PASSWORD: DemoPass123
        run: npm run test:e2e
      - name: Dump app logs on failure
        if: failure()
        run: docker compose logs --tail=200 backend frontend
